name: student-manager-crm
region: fra
services:
  - name: crm-backend
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DB_HOST
        scope: RUN_TIME
      - key: DB_PORT
        scope: RUN_TIME
        value: "5432"
      - key: DB_USER
        scope: RUN_TIME
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: DB_NAME
        scope: RUN_TIME
      - key: DB_SYNC
        scope: RUN_TIME
        value: "true"

  - name: crm-frontend
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: https://go.schoolmanage.uz/api
